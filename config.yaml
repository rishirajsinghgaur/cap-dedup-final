# Q1-Ready Framework Configuration
# Uncertainty-Aware Safety-Preserving Deduplication for Industrial IoT

project:
  name: "Uncertainty-Aware Safety-Preserving Deduplication"
  version: "2.0"
  author: "Research Team"
  target_journal: "IEEE Transactions on Industrial Informatics"

# Data Configuration
data:
  dataset_name: "SKAB"
  data_dir: "SKAB"
  sample_size: 3000
  train_test_split: 0.8
  val_split: 0.2
  random_seed: 42

# Model Architecture
model:
  input_dim: 8  # SKAB has 8 sensor features
  embedding_dim: 64
  hidden_dim: 128
  num_ensemble_models: 7
  bayesian_dropout_rate: 0.3

# Training Configuration
training:
  bayesian_epochs: 50
  siamese_epochs: 50
  early_stopping_patience: 10
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.00001
  optimizer: "AdamW"
  
# Uncertainty Thresholds (TEP runner uses these gates on min-max normalized U; see tep_experiment.py)
uncertainty:
  low_threshold: 0.05   # Level 1: U < tau_low (TEP experiments)
  high_threshold: 0.15  # Level 2: U >= tau_high (TEP experiments; metadata in tep_experiment_results.json)
  similarity_threshold: 0.85
  mc_samples: 10

# Causal Discovery
causal:
  alpha: 0.05
  use_pearson: true
  use_spearman: true
  use_mutual_info: true
  use_ks_test: true
  variance_ratio_threshold: 2.0

# Evaluation Metrics
evaluation:
  metrics:
    - "f1_score"
    - "precision"
    - "recall"
    - "accuracy"
    - "safety_preservation_rate"
    - "storage_savings"
    - "throughput"
  confidence_interval: 0.95
  statistical_tests:
    enabled: true
    test_type: "wilcoxon"

# Experiment Configuration
experiments:
  baseline_comparisons:
    - "LSH"
    - "MinHash"
    - "Standard_Siamese"
    - "Cosine_Similarity"
  ablation_components:
    - "bayesian_uncertainty"
    - "causal_discovery"
    - "multi_level_adaptation"
    - "siamese_network"
  
# Ablation Studies
ablation:
  enabled: true
  study_configs:
    - name: "Full Framework"
      use_bayesian: true
      use_causal: true
      use_multi_level: true
      use_siamese: true
    - name: "Without Bayesian"
      use_bayesian: false
      use_causal: true
      use_multi_level: true
      use_siamese: true
    - name: "Without Causal"
      use_bayesian: true
      use_causal: false
      use_multi_level: true
      use_siamese: true
    - name: "Without Multi-Level"
      use_bayesian: true
      use_causal: true
      use_multi_level: false
      use_siamese: true
    - name: "Without Siamese"
      use_bayesian: true
      use_causal: true
      use_multi_level: true
      use_siamese: false

# Output Configuration
output:
  results_dir: "results"
  figures_dir: "figures"
  logs_dir: "logs"
  save_model: true
  save_embeddings: false
  
# Device Configuration
device:
  use_gpu: true
  device_id: 0

# Visualization
visualization:
  style: "seaborn-v0_8"
  dpi: 300
  format: "png"
  figsize_width: 12
  figsize_height: 8

# Reproducibility
reproducibility:
  seed: 42
  deterministic: true
  benchmark: false
